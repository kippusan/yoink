[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
# ── Shared ───────────────────────────────────────────────────
chrono = { version = "0.4", features = ["clock", "serde", "wasmbind"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v7", "serde", "js"] }
async-trait = "0.1"

# ── Leptos ecosystem ────────────────────────────────────────
leptos = "0.8"
leptos_router = "0.8"
leptos_axum = "0.8"
lucide-leptos = { version = "2", features = ["all-icons"] }

# ── Server ──────────────────────────────────────────────────
axum = { version = "0.8", features = ["form", "json", "macros"] }
governor = "0.8"
base64 = "0.22"
better-config = { version = "0.2", features = ["env"] }
serial_test = "3"
lrclib-api-rs = "0.3"
lofty = "0.22"
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
] }
musicbrainz_rs = { version = "0.12", features = ["rate_limit"] }
roxmltree = "0.20"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "uuid"] }
strsim = "0.11"
tokio = { version = "1", features = [
  "fs",
  "io-util",
  "macros",
  "rt-multi-thread",
  "sync",
] }
tokio-stream = { version = "0.1", features = ["sync"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "normalize-path", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt",
  "json",
] }

# ── Client (WASM) ──────────────────────────────────────────
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = [
  "Document",
  "Element",
  "HtmlElement",
  "HtmlInputElement",
  "Window",
  "NodeList",
  "Storage",
  "MediaQueryList",
  "Event",
  "EventTarget",
  "InputEvent",
  "KeyboardEvent",
  "MouseEvent",
  "FocusEvent",
  "AbortController",
  "AbortSignal",
  "Headers",
  "Request",
  "RequestInit",
  "RequestMode",
  "Response",
  "EventSource",
] }

# ── Internal crates ─────────────────────────────────────────
yoink-shared = { path = "crates/yoink-shared" }
yoink-app = { path = "crates/yoink-app" }

[[workspace.metadata.leptos]]
name = "yoink"
output-name = "yoink"
site-root = "target/site"
site-pkg-dir = "pkg"
assets-dir = "public"
site-addr = "127.0.0.1:3000"
reload-port = 3001
tailwind-input-file = "style/tailwind.css"
bin-package = "yoink-server"
lib-package = "yoink-client"
