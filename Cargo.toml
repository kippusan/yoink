[package]
name = "yoink"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["ssr"]
hydrate = ["dep:wasm-bindgen", "leptos/hydrate"]
ssr = [
  "dep:axum",
  "dep:base64",
  "dep:chrono",
  "dep:lofty",
  "dep:reqwest",
  "dep:sqlx",
  "dep:serde",
  "dep:serde_json",
  "dep:tokio",
  "dep:tokio-stream",
  "dep:tower-http",
  "dep:tracing",
  "dep:tracing-subscriber",
  "leptos/ssr",
]

[dependencies]
axum = { version = "0.8", features = ["form", "json", "macros"], optional = true }
base64 = { version = "0.22", optional = true }
chrono = { version = "0.4", features = ["clock", "serde"], optional = true }
leptos = { version = "0.8" }
lofty = { version = "0.22", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
tokio = { version = "1", features = ["fs", "io-util", "macros", "rt-multi-thread", "sync"], optional = true }
tokio-stream = { version = "0.1", features = ["sync"], optional = true }
tower-http = { version = "0.6", features = ["fs", "trace"], optional = true }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }

[package.metadata.leptos]
output-name = "yoink"
site-root = "target/site"
site-pkg-dir = "pkg"
assets-dir = "public"
site-addr = "127.0.0.1:3000"
reload-port = 3001
tailwind-input-file = "style/tailwind.css"
bin-features = ["ssr"]
lib-features = ["hydrate"]
bin-default-features = false
lib-default-features = false
