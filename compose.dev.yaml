---
services:
  yoink:
    build: .
    container_name: yoink
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - yoink-data:/data
      - ./music:/music
      - ./development/slskd-data:/app
    environment:
      RUST_BACKTRACE: 1
      AUTH_DISABLED: true
  slskd:
    image: slskd/slskd
    container_name: slskd
    ports:
      - "5030:5030"
      - "5031:5031"
      - "50300:50300"
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./development/slskd-data:/app
      - ./music:/music
    env_file:
      - .env.docker
    restart: always

volumes:
  yoink-data:
